<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 10: Слайдер</title>
    <style>
        body { font-family: Arial; padding: 20px; }

        .slider {
            width: 300px;
            height: 200px;
            overflow: hidden;
            border: 2px solid #ccc;
            cursor: pointer;
        }

        .slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease;
        }

        .slides img {
            width: 300px;
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<h2>Слайдер (натискай на картинку)</h2>

<div class="slider" id="slider">
    <div class="slides" id="slides">
        <img src="https://picsum.photos/id/1011/300/200">
        <img src="https://picsum.photos/id/1012/300/200">
        <img src="https://picsum.photos/id/1015/300/200">
        <img src="https://picsum.photos/id/1016/300/200">
    </div>
</div>

<script src="slider.js"></script>

</body>
</html>
