<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Тест з таблиці множення - введення числа</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .task, .score, .result { margin: 10px 0; font-size: 18px; }
        input[type="number"] { width: 60px; padding: 3px; font-size: 16px; }
        button { margin-top: 10px; padding: 5px 10px; }
    </style>
</head>
<body>
<div class="score">Загальний рахунок: 0%</div>
<div class="task">Натисніть "Наступне завдання" для початку тесту</div>

<input type="number" class="answer" placeholder="Введіть відповідь">
<button class="check">Перевірити</button>
<div class="result"></div>
<button class="next">Наступне завдання</button>

<script src="multiplication_input.js"></script>
</body>
</html>
