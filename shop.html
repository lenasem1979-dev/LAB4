<!DOCTYPE html>
<html lang="uk">
<head>

        .product { margin: 10px 0; }
        table { margin-top: 20px; border-collapse: collapse; }
        td, th { border: 1px solid #ccc; padding: 5px 10px; }

<body>

        <th>Товар</th>

<script src="shop.js"></script>
